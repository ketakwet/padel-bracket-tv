<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Padel Bracket TV</title>

    <script src="https://www.gstatic.com/cast/sdk/libs/receiver/2.0.0/cast_receiver.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>

<body>
<canvas id="screen"></canvas>

<script>
    console.log("Receiver démarré (API v2)");

    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.onresize = resize;

    // Receiver Manager
    const receiverManager = cast.receiver.CastReceiverManager.getInstance();
    console.log("ReceiverManager OK");

    // Message Bus
    const messageBus = receiverManager.getCastMessageBus("urn:x-cast:padel.bracket");

    messageBus.onMessage = function(event) {
        console.log("Message reçu :", event.data);
        const data = JSON.parse(event.data);
        renderBracket(data);
    };

    function renderBracket(data) {
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0f0";
        ctx.font = "40px Arial";
        ctx.fillText("Bracket reçu :", 50, 80);

        ctx.font = "28px Arial";
        ctx.fillText(JSON.stringify(data), 50, 140);
    }

    receiverManager.start();
    console.log("Receiver démarré !");
</script>

</body>
</html>
